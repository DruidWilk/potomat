name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src
        continue-on-error: true

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
          rsync -a --exclude='.git' --exclude='.github' main-src/ site/
          if [ -d dev-src ]; then
            mkdir -p site/dev
            rsync -a --exclude='.git' --exclude='.github' dev-src/ site/dev/
          fi
          ls -la site
          [ -d site/dev ] && ls -la site/dev || echo "dev branch not yet present"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
